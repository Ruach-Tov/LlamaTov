<svg xmlns="http://www.w3.org/2000/svg" width="800" height="360" viewBox="0 0 800 360" font-family="sans-serif">
  <rect x="0" y="0" width="800" height="360" fill="#fafafa"/>
  <text x="20" y="30" font-size="18" font-weight="bold" fill="#222">Threadblock-to-tile mapping: sgemv_substrate_native</text>
  <text x="20" y="52" font-size="13" fill="#555">One block per output row. Block size 32. Reduction: warp_shuffle.</text>
  <text x="60" y="82" font-size="12" fill="#444">y[row]</text>
  <rect x="60" y="90" width="50" height="28" fill="#FFB347" stroke="#333" stroke-width="1"/>
  <text x="85" y="108" font-size="11" fill="#222" text-anchor="middle">row 0</text>
  <rect x="60" y="118" width="50" height="28" fill="#77DD77" stroke="#333" stroke-width="1"/>
  <text x="85" y="136" font-size="11" fill="#222" text-anchor="middle">row 1</text>
  <rect x="60" y="146" width="50" height="28" fill="#779ECB" stroke="#333" stroke-width="1"/>
  <text x="85" y="164" font-size="11" fill="#222" text-anchor="middle">row 2</text>
  <rect x="60" y="174" width="50" height="28" fill="#C49BBB" stroke="#333" stroke-width="1"/>
  <text x="85" y="192" font-size="11" fill="#222" text-anchor="middle">row 3</text>
  <rect x="60" y="202" width="50" height="28" fill="#FDFD96" stroke="#333" stroke-width="1"/>
  <text x="85" y="220" font-size="11" fill="#222" text-anchor="middle">row 4</text>
  <rect x="60" y="230" width="50" height="28" fill="#FFB6C1" stroke="#333" stroke-width="1"/>
  <text x="85" y="248" font-size="11" fill="#222" text-anchor="middle">row 5</text>
  <text x="126" y="108" font-size="12" fill="#555">← block 0</text>
  <text x="126" y="136" font-size="12" fill="#555">← block 1</text>
  <text x="126" y="164" font-size="12" fill="#555">← block 2</text>
  <text x="126" y="192" font-size="12" fill="#555">← block 3</text>
  <text x="126" y="220" font-size="12" fill="#555">← block 4</text>
  <text x="126" y="248" font-size="12" fill="#555">← block 5</text>
  <text x="40" y="308" font-size="14" fill="#333" font-family="monospace">row = blockIdx.x;  threads tid in [0..32) stride across K, reduce.</text>
</svg>
