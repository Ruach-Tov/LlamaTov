[pytest]
# Pytest configuration for bpd test substrate.
#
# Markers register the substrate's test tiers. Per medayek's
# 2026-05-18 00:22 UTC design + Heath's F2 closure directive:
#
#   smoke       : CI default tier. One representative configuration per
#                 kernel (typically size=1024 for activations, the
#                 ULP-sensitive size). Catches regressions quickly.
#   full_sweep  : Periodic / pre-release tier. All (kernel, size) pairs.
#                 Catches size-specific regressions (e.g., boundary
#                 conditions at 257 vs 1024).
#   tier3       : Requires GPU hardware. Subset of GPU_REQUIRED in the
#                 test sources but exposed as a marker for ci/run_tests.sh
#                 to invoke.
#
# Run smoke tests: pytest -m smoke
# Run full sweep:  pytest -m full_sweep
# Run everything:  pytest

markers =
    smoke: F2-closure CI default tier. One representative size per kernel.
    full_sweep: F2-closure periodic tier. All (kernel, size) pairs.
    tier3: Requires GPU hardware + nvcc.
